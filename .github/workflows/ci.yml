name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://u:p@localhost-pooler.neon.tech/db?sslmode=require
      DIRECT_URL: postgresql://u:p@localhost.neon.tech/db?sslmode=require
      AUTH_SECRET: ci-placeholder-secret-ci-placeholder-secret
      AUTH_GITHUB_ID: ci
      AUTH_GITHUB_SECRET: ci
      AUTH_GOOGLE_ID: ci
      AUTH_GOOGLE_SECRET: ci
      S3_BUCKET: ci
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ci
      S3_SECRET_ACCESS_KEY: ci
      ADMIN_EMAILS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
